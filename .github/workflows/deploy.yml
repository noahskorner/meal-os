name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  VERCEL_TARGET: production

jobs:
  migrate-database:
    name: Migrate database
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply Prisma migrations
        run: npm run db:migrate:deploy

  deploy-api:
    name: Deploy API (apps/web)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: migrate-database
    environment: production
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
      VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ vars.VERCEL_API_PROJECT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Pull Vercel project settings
        run: npx vercel pull --yes --environment=${{ env.VERCEL_TARGET }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Vercel project
        run: npx vercel build --yes --target=${{ env.VERCEL_TARGET }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy API to Vercel
        run: npx vercel deploy --prebuilt --target=${{ env.VERCEL_TARGET }} --token=${{ secrets.VERCEL_TOKEN }}

  deploy-mobile-web:
    name: Deploy mobile web
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: migrate-database
    environment: production
    env:
      VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ vars.VERCEL_MOBILE_WEB_PROJECT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Pull Vercel project settings
        run: npx vercel pull --yes --environment=${{ env.VERCEL_TARGET }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Expo web app
        run: npm run build --workspace=mobile

      - name: Deploy mobile web to Vercel
        run: npx vercel deploy apps/mobile/dist --target=${{ env.VERCEL_TARGET }} --token=${{ secrets.VERCEL_TOKEN }}
