name: CI/CD

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Validate
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  run-migrations:
    name: Run migrations
    needs: ci
    if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch' }}
    uses: ./.github/workflows/run-migrations.yml
    secrets: inherit

  deploy-web:
    name: Deploy web
    needs:
      - ci
      - run-migrations
    if: ${{ needs.run-migrations.result == 'success' }}
    uses: ./.github/workflows/deploy-web.yml
    secrets: inherit

  deploy-mobile:
    name: Deploy mobile
    needs:
      - ci
      - run-migrations
    if: ${{ needs.run-migrations.result == 'success' }}
    uses: ./.github/workflows/deploy-mobile.yml
    secrets: inherit
