name: Deploy Web

on:
  workflow_call:

env:
  VERCEL_TARGET: production

jobs:
  deploy-web:
    name: Deploy web
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
      VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ vars.VERCEL_API_PROJECT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Pull Vercel project settings
        run: npx vercel pull --yes --environment=${{ env.VERCEL_TARGET }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Vercel project
        run: npx vercel build --yes --target=${{ env.VERCEL_TARGET }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy API to Vercel
        run: npx vercel deploy --prebuilt --target=${{ env.VERCEL_TARGET }} --token=${{ secrets.VERCEL_TOKEN }}
